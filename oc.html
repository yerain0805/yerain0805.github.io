<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OC圖鑑</title>
    <link rel="stylesheet" href="css/character.css">
</head>
<body>
<div class="container">

    <div class="character-card miaoyou-theme">
        <div class="img-area">
           <img class="card_bg" src="img/miaoyou_bg.png" alt="背景">
           <img class="card_npc" src="img/miaoyou_char.png" alt="喵幽">
        </div>

        <div class="info">
            <h2 class="name">喵幽 / 幽逸雨</h2>
            <p class="profile">擁有極強再生能力的魔天混血兒。在「葉」面前是黏人的大狗狗，在外人面前則是禮貌且疏離的理智瘋子。</p>
            <div class="detail">
                <ul>
                    <li><div class="detail_title">身高：</div><div class="detail_text">179cm</div></li>
                    <li><div class="detail_title">生日：</div><div class="detail_text">08/05</div></li>
                    <li><div class="detail_title">種族：</div><div class="detail_text">魔族、天族</div></li>
                    <li><div class="detail_title">興趣：</div><div class="detail_text">探索未知、健身</div></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="character-card bonnie-theme">
        <div class="img-area">
            <img class="card_bg" src="img/bonnie_bg.png" alt="背景">
            <img class="card_npc" src="img/bonnie_char.png" alt="蓓妮">
        </div>

        <div class="info">
            <h2 class="name">蓓妮·克利斯多夫</h2>
            <p class="profile">別名 Bonnie。曾嘗試取代神的天族，墜入人間後由「葉」收留。是一位天才駭客兼遊戲設計師。</p>
            <div class="detail">
                <ul>
                    <li><div class="detail_title">身高：</div><div class="detail_text">151cm</div></li>
                    <li><div class="detail_title">年齡：</div><div class="detail_text">約 500 歲</div></li>
                    <li><div class="detail_title">愛好：</div><div class="detail_text">草莓大福、電玩</div></li>
                    <li><div class="detail_title">職業：</div><div class="detail_text">黑客、遊戲設計</div></li>
                </ul>
            </div>
        </div>
    </div>


</div>
</body>
</html>
